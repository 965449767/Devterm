name: Build Node.js for DevTerm

on:
  workflow_dispatch:
    inputs:
      node_version:
        description: 'Node.js version to build'
        required: true
        default: '24.8.0'
  schedule:
    - cron: '0 0 1 * *'  # Monthly rebuild

jobs:
  build-node:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build Node.js for Android ARM64
        run: |
          bash scripts/build-node.sh "${{ github.event.inputs.node_version || '24.8.0' }}"

      - name: Upload Node.js binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: nodejs-android-arm64
          path: app/src/main/assets/nodejs/
          retention-days: 30

  build-apk:
    needs: build-node
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download Node.js artifact
        uses: actions/download-artifact@v4
        with:
          name: nodejs-android-arm64
          path: app/src/main/assets/nodejs/

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build APK with Node.js bundled
        run: |
          ls -la app/src/main/assets/nodejs/bin/
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: DevTerm-APK
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
